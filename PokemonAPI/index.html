<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PokéAPI Project</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <main class="pokemon-card">
        <h1>PokeAPI</h1>
        
        <div class="search-container">
            <input type="text" id="pokemonInput" placeholder="Digite a id ou o nome do pokemon">
            <button id="btnEnviar">Enviar</button>
        </div>

        <div id="pokemonDetails" class="details">
            <h2 id="pokemonName"></h2>
            <div id="imageContainer"></div>
            <p class="attack" id="attack1"></p>
            <p class="attack" id="attack2"></p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
